[SectionsToSave]
bCanSaveAllSections=true

[/Script/Dominion.DedicatedServerSettings]
; Password used to grant access to the server management screen
AdminPassword=${RSDW_ADMIN_PASSWORD}
; Password applied when a map is loaded (unprotected if empty)
WorldPassword=${RSDW_PASSWORD}
; AUTO-GENERATED
ServerGuid=
; Name displayed for the server under the "Created By" column
ServerName=${RSDW_SERVER_NAME}
; Name displayed for the world save, this acts as the "Server Name" when searching
DefaultWorldName=${RSDW_WORLD_NAME}
; Comma separated list of user ids that have administrator access to the server
AdministratorList=(${RSDW_ADMINS})
; EOS ID of the user who owns the server
OwnerId=${RSDW_OWNER_ID}
